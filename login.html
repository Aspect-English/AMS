<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AMS Login</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{

    margin:0;

    background:#f6f0ea;

    font-family:"Noto Sans TC","Microsoft JhengHei";

}

.login-page{

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

}

.login-card{

    width:420px;

    background:white;

    border-radius:25px;

    padding:45px;

    box-shadow:0 20px 60px rgba(0,0,0,.08);

}

.logo{

    text-align:center;

    margin-bottom:35px;

}

.logo-circle{

    width:80px;

    height:80px;

    background:#4A2118;

    border-radius:20px;

    color:white;

    font-size:40px;

    display:flex;

    justify-content:center;

    align-items:center;

    margin:auto;

}

.logo h2{

    margin:20px 0 5px;

}

.logo p{

    color:#888;

}

.input-group{

    margin-bottom:20px;

}

.input-group label{

    display:block;

    margin-bottom:8px;

    font-weight:600;

}

.input-group input{

    width:100%;

    height:48px;

    border:1px solid #ddd;

    border-radius:12px;

    padding:0 15px;

    font-size:15px;

    box-sizing:border-box;

}

.login-btn{

    width:100%;

    height:50px;

    background:#4A2118;

    color:white;

    border:0;

    border-radius:12px;

    font-size:16px;

    cursor:pointer;

    margin-top:15px;

}

.footer{

    text-align:center;

    margin-top:25px;

    color:#999;

    font-size:13px;

}

</style>

</head>

<body>

<div class="login-page">

<div class="login-card">

<div class="logo">

<div class="logo-circle">

A

</div>

<h2>Aspect Management System</h2>

<p>雅斯貝管理中心</p>

</div>

<div class="input-group">

<label>

帳號

</label>

<input
id="username"
type="text"
placeholder="請輸入帳號">

</div>

<div class="input-group">

<label>

密碼

</label>

<input
id="password"
type="password"
placeholder="請輸入密碼">

</div>

<button
class="login-btn"
onclick="login()">

登入

</button>

<div class="footer">

Aspect English © 2026

</div>

</div>

</div>

<script src="js/login.js"></script>

</body>
</html>
